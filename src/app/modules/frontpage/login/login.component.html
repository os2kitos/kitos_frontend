<form [formGroup]="loginForm" (ngSubmit)="login()">
  <app-standard-vertical-content-grid>
    <div class="center-item">
      <img src="assets/img/os2kitos.svg" height="33" width="116" />
    </div>
    <h3 class="title center-item">Kitos er Kommunernes IT Overblikssystem</h3>
    <app-sso-button></app-sso-button>
    @if (ssoErrorCode$ | async; as ssoErrorCode) {
      <app-sso-error [ssoErrorCode]="ssoErrorCode"></app-sso-error>
    }
    <app-accordion title="Kan du ikke logge ind med SSO?" i18n-title class="manual-login-accordion">
      <p class="manual-login-description" i18n>
        Brug manuel login, hvis din organisation ikke anvender SSO,<br />
        eller hvis du har fået besked på at logge ind med email og password.
      </p>
      <app-textbox
        [formGroup]="loginForm"
        formName="email"
        type="email"
        showValidation="initial"
        text="Email adresse"
        i18n-text
      ></app-textbox>
      <app-textbox
        text="Password"
        [formGroup]="loginForm"
        formName="password"
        type="password"
        showValidation="initial"
        i18n-text
      ></app-textbox>
      <app-checkbox
        labelPosition="after"
        [formGroup]="loginForm"
        formName="remember"
        text="Forbliv logget ind"
        i18n-text
        tooltip="Gemmer din session så du ikke logges ud automatisk."
        i18n-tooltip
      ></app-checkbox>
      <app-button type="submit" [disabled]="disableLoginButton()" data-cy="login-button" i18n>Log ind</app-button>
      <app-reset-password-text-link class="center-item"></app-reset-password-text-link>
    </app-accordion>
  </app-standard-vertical-content-grid>
</form>
