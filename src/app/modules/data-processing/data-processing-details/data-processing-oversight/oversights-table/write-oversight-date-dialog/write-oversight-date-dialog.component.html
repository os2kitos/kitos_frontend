<app-dialog [title]="title" overflow="none">
  <form [formGroup]="oversightDateFormGroup" (submit)="onSave()">
    <app-standard-vertical-content-grid>
      <app-edit-url-section
        title="Link til tilsynsrapport"
        [simpleLink$]="currentReportLink$"
        i18n-title
        [namePermission$]="oversightLinkNameFieldPermission$"
        [nameDisabledMessage]="supplierText"
        [linkPermission$]="oversightLinkUrlFieldPermission$"
        [linkDisabledMessage]="supplierText"
        (clearClick)="onClearReportLink()"
        (submitMethod)="onReportLinkChange($event)"
      ></app-edit-url-section>
      <app-tooltip [text]="(oversightDateFieldPermission$ | async) !== true ? supplierText : ''">
        <app-datepicker
          text="Dato"
          [formGroup]="oversightDateFormGroup"
          formName="date"
          data-cy="datepicker-control"
          i18n-text
        ></app-datepicker>
      </app-tooltip>
      <app-tooltip [text]="(oversightOptionFieldPermission$ | async) !== true ? supplierText : ''">
        <app-dropdown
          text="Tilsynsmulighed"
          [formGroup]="oversightDateFormGroup"
          formName="oversightOption"
          data-cy="oversight-option-control"
          [data]="oversightOptions$ | async"
          valueField="uuid"
          i18n-text
        ></app-dropdown>
      </app-tooltip>
      <app-tooltip [text]="(oversightRemarkFieldPermission$ | async) !== true ? supplierText : ''">
        <app-textarea
          text="Bemærkning"
          [formGroup]="oversightDateFormGroup"
          formName="notes"
          data-cy="notes-control"
          i18n-text
        ></app-textarea>
      </app-tooltip>
      <app-dialog-actions>
        <app-button buttonStyle="secondary" (buttonClick)="onCancel()" i18n>Annuller</app-button>
        <app-button
          type="submit"
          [disabled]="oversightDateFormGroup.valid === false || isBusy"
          i18n
          data-cy="save-button"
          >Gem</app-button
        >
      </app-dialog-actions>
    </app-standard-vertical-content-grid>
  </form>
</app-dialog>
