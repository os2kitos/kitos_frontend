apiVersion: v1
kind: Service
metadata:
  name: kitos-frontend
  namespace: kitos
spec:
  ports:
  - appProtocol: http
    name: http
    port: 80
    protocol: TCP
    targetPort: 4200
  - appProtocol: https
    name: https
    port: 443
    protocol: TCP
    targetPort: 8080
  selector:
    app: kitos-frontend
  type: ClusterIP
